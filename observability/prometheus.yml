# Prometheus scrape config (scaffold; fully provisioned in Phase 7).
# The auditor runs natively on the host, so from a container reach it via host.docker.internal.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: auditor
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
