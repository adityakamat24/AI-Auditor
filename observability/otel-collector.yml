# OpenTelemetry Collector config - AI Auditor Phase 7
#
# Receivers  : OTLP (gRPC :4317, HTTP :4318)
# Processors : batch (memory-efficient flush)
# Exporters  :
#   prometheus - exposes /metrics on :8889 so Prometheus can scrape the collector's own metrics
#   logging    - structured debug output to collector stdout (verbosity: normal in prod)
#
# Pipelines:
#   traces  → otlp → batch → logging
#   metrics → otlp → batch → prometheus
#
# The auditor's application metrics (prometheus_client) are scraped directly by Prometheus
# from host.docker.internal:8000/metrics.  This collector handles OTel-instrumented
# traces and any metrics the app emits via the OTel SDK (opentelemetry-sdk).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1000
    timeout: 5s

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: otelcol
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
