# Backing services for the AI Auditor (the "Docker for services + native app" model).
# The auditor and harness run NATIVELY on the host (so Windows Sysmon can observe the host);
# only the stateful/3rd-party services live here. Bring up with: docker compose up -d
#
# Postgres + Redis expose container healthchecks (their CLIs ship in-image). MinIO / OPA / LiteLLM
# are polled from the host by the init/demo scripts (their images are minimal, no curl), and the
# auditor's /health probes them at request time.
#
# Profiles:
#   (default)                                 postgres, redis, minio, opa
#   docker compose --profile judge up -d      + litellm  (needs ANTHROPIC_API_KEY)
#   docker compose --profile observability up -d  + prometheus, grafana, otel-collector
#   docker compose --profile judge --profile observability up -d  # full stack

name: ai-auditor

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auditor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditor}
      POSTGRES_DB: ${POSTGRES_DB:-auditor}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditor} -d ${POSTGRES_DB:-auditor}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  opa:
    image: openpolicyagent/opa:1.14.0
    command: ["run", "--server", "--addr=0.0.0.0:8181", "--log-level=error", "/policies"]
    ports:
      - "8181:8181"
    volumes:
      - ./opa/policies:/policies:ro

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    profiles: ["judge"]
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro

  # ---------------------------------------------------------------------------
  # Observability stack (optional - bring up with: docker compose --profile observability up -d)
  # The auditor runs natively on the host; Prometheus reaches it via host.docker.internal:8000/metrics.
  # Grafana is available at http://localhost:3000 (admin / admin - change on first login).
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.52.0
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus

  grafana:
    image: grafana/grafana:11.0.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/auditor_overview.json
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    profiles: ["observability"]
    command: ["--config=/etc/otel/collector.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter (collector's own OTel metrics)
    volumes:
      - ./observability/otel-collector.yml:/etc/otel/collector.yaml:ro

volumes:
  pgdata:
  redisdata:
  miniodata:
  prometheusdata:
  grafanadata:
