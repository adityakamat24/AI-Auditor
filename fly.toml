# Fly.io deployment config for the AI Auditor demo.
#
# This deploys a single app that serves the React UI + the FastAPI auditor + OPA + an
# in-container Redis. It expects an external Postgres set via the POSTGRES_DSN secret
# (use Fly Postgres - see README).
#
# First-time deploy:
#   fly launch --no-deploy --copy-config              # accepts this fly.toml
#   fly postgres create --name ai-auditor-db          # provisions managed Postgres
#   fly postgres attach ai-auditor-db                 # sets DATABASE_URL secret on the app
#   fly secrets set POSTGRES_DSN="$(fly secrets list -j | jq -r '.[]|select(.Name=="DATABASE_URL")|.Value' | sed 's,^postgres://,postgresql+asyncpg://,')"
#   fly secrets set JWT_SECRET="$(openssl rand -hex 32)"
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-...      # OPTIONAL - omit to use the offline judge stub
#   fly deploy

app = "ai-auditor"
primary_region = "ord"   # change to whatever Fly region is nearest your CEO

[build]
  dockerfile = "Dockerfile"

[env]
  API_HOST = "0.0.0.0"
  API_PORT = "8000"
  OPA_URL  = "http://127.0.0.1:8181"
  REDIS_URL = "redis://127.0.0.1:6379/0"
  IPC_MTLS_ENABLED = "false"
  GATE_TIMEOUT_MS  = "500"
  LOG_LEVEL = "INFO"
  # The judge calls LiteLLM by default. If LiteLLM isn't deployed alongside, the JudgeClient
  # falls back to the deterministic offline stub - safe for demos with no Anthropic key.
  LITELLM_BASE_URL = ""

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"     # idle? Fly stops the machine to save money
  auto_start_machines = true      # wakes on the first incoming request
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 30
    hard_limit = 60

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"                   # Python + uvicorn + redis + opa + spaCy fits in 1GB
  cpu_kind = "shared"
  cpus = 1
