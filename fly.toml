# fly.toml app configuration file generated for ai-auditor-soft-lantern-7454 on 2026-05-28T02:34:52-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-auditor-soft-lantern-7454'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  API_HOST = '0.0.0.0'
  API_PORT = '8000'
  GATE_TIMEOUT_MS = '500'
  IPC_MTLS_ENABLED = 'false'
  LITELLM_BASE_URL = ''
  LOG_LEVEL = 'INFO'
  OPA_URL = 'http://127.0.0.1:8181'
  REDIS_URL = 'redis://127.0.0.1:6379/0'
  # Force every run into the deep audit path so the demo verdict panel populates every time.
  # Override to 'percentage' + SAMPLER_RATE='0.05' for cost-aware production behaviour.
  SAMPLER_MODE = 'always'
  SAMPLER_RATE = '1.0'

[http_service]
  internal_port = 8000
  force_https = true
  # Keep the machine warm for the CEO demo - cold start adds ~25s while spaCy / Presidio init,
  # which ruins the first impression. Flip back to auto_stop_machines='stop' + min=0 to save ~$3/mo
  # after the demo window.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 60
    soft_limit = 30

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
